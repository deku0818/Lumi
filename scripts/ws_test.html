<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>Lumi WS Test</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 780px; margin: 2rem auto; padding: 0 1rem; }
  #log { white-space: pre-wrap; border: 1px solid #ccc; border-radius: 6px; padding: 1rem;
         height: 440px; overflow: auto; font-size: 14px; line-height: 1.5; }
  #log > div { margin: 2px 0; }
  .row { display: flex; gap: 8px; margin-top: 10px; }
  #msg { flex: 1; padding: 8px; }
  button { padding: 8px 16px; }
  .meta { color: #888; }
</style>
</head>
<body>
  <h3>Lumi WS Test <span class="meta" id="status">connecting…</span></h3>
  <div id="log"></div>
  <div class="row">
    <input id="msg" placeholder="说点什么，回车发送…" autofocus>
    <button id="send">发送</button>
  </div>
  <p class="meta">默认连 ws://127.0.0.1:8765/ws，可用 ?ws=ws://host:port/ws 覆盖。</p>
<script>
const url = (location.search.match(/[?&]ws=([^&]+)/) || [])[1]
  ? decodeURIComponent(location.search.match(/[?&]ws=([^&]+)/)[1])
  : 'ws://127.0.0.1:8765/ws';
const statusEl = document.getElementById('status');
const logEl = document.getElementById('log');
let ws, nextId = 1, cur = null;

function line(text) {
  const d = document.createElement('div');
  d.textContent = text;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
  return d;
}

function onEvent(ev) {
  const { type, payload } = ev;
  switch (type) {
    case 'gateway.ready': line('● 就绪  model=' + payload.model); break;
    case 'message.start': cur = line('🤖 '); break;
    case 'message.delta': (cur || (cur = line('🤖 '))).textContent += payload.text; break;
    case 'message.complete': cur = null; break;
    case 'tool.start': line('🔧 ' + payload.name + '  ' + JSON.stringify(payload.args)); break;
    case 'tool.complete': line('✅ ' + payload.name + ' → ' + String(payload.output || '').slice(0, 300)); break;
    case 'approval.request': line('⚠ 需要审批: ' + JSON.stringify(payload.tool_calls || payload)); break;
    case 'clarify.request': line('❓ ' + JSON.stringify(payload)); break;
    case 'plan.request': line('📋 plan 确认: ' + JSON.stringify(payload)); break;
    case 'turn.complete': line('— 完成 —'); cur = null; break;
    case 'error': line('❌ ' + payload.message); break;
    default: line(type + '  ' + JSON.stringify(payload));
  }
}

function connect() {
  ws = new WebSocket(url);
  ws.onopen = () => statusEl.textContent = 'connected';
  ws.onclose = () => statusEl.textContent = 'closed';
  ws.onerror = () => statusEl.textContent = 'error';
  ws.onmessage = (e) => {
    const f = JSON.parse(e.data);
    if (f.method === 'event') onEvent(f.params);
    else if (f.error) line('‼ ' + f.error.message);
  };
}

function send() {
  const m = document.getElementById('msg');
  if (!m.value || ws.readyState !== WebSocket.OPEN) return;
  line('🧑 ' + m.value);
  ws.send(JSON.stringify({ id: nextId++, method: 'send_message', params: { content: m.value } }));
  m.value = '';
}

document.getElementById('send').onclick = send;
document.getElementById('msg').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
connect();
</script>
</body>
</html>
